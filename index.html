<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sweet Delights Bakery 🎀🍓</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🌸 BASE BACKGROUND */
body {
    margin: 0;
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(135deg, #ffe4ec, #fff0f5, #fff9c4);
    overflow-x: hidden;
}

/* 🎀 MOVING RIBBONS */
.ribbon {
    position: absolute;
    width: 200px;
    height: 40px;
    background: linear-gradient(90deg, rgba(255,182,193,0.8), rgba(255,240,245,0.6));
    border-radius: 50px;
    filter: blur(1px);
    opacity: 0.6;
    animation: floatRibbon 10s linear infinite;
}

.ribbon:nth-child(1) { top: 10%; left: -200px; animation-duration: 12s; }
.ribbon:nth-child(2) { top: 30%; left: -250px; animation-duration: 18s; }
.ribbon:nth-child(3) { top: 60%; left: -300px; animation-duration: 14s; }
.ribbon:nth-child(4) { top: 80%; left: -220px; animation-duration: 16s; }

@keyframes floatRibbon {
    0% { transform: translateX(0) rotate(10deg); }
    100% { transform: translateX(140vw) rotate(10deg); }
}

/* HEADER */
header {
    text-align: center;
    padding: 50px 20px;
    font-family: 'Playfair Display', serif;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,192,203,0.4);
    position: relative;
    z-index: 10;
}

h1 {
    margin: 0;
    color: #d63384;
}

/* MENU */
.menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    padding: 40px;
    position: relative;
    z-index: 10;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-radius: 25px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(255,105,180,0.15);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

/* TITLE */
.card h3 {
    font-family: 'Playfair Display', serif;
    color: #ff4d88;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ff4d88, #ff99bb);
    color: white;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

/* CART */
.cart {
    position: fixed;
    right: 15px;
    top: 15px;
    width: 240px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    padding: 15px;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    z-index: 20;
}

.cart h3 {
    font-family: 'Playfair Display', serif;
    color: #d63384;
}

.item {
    font-size: 14px;
    margin: 6px 0;
}

</style>
</head>

<body>

<!-- 🎀 MOVING RIBBONS BACKGROUND -->
<div class="ribbon"></div>
<div class="ribbon"></div>
<div class="ribbon"></div>
<div class="ribbon"></div>

<header>
    <h1>🎀 Sweet Delights Bakery 🍓</h1>
    <p>Elegant coquette desserts made with love</p>
</header>

<!-- 🛒 CART -->
<div class="cart">
    <h3>🛒 Cart</h3>
    <div id="cart"></div>
</div>

<!-- MENU -->
<div class="menu">

    <div class="card">
        <h3>🍓 Strawberry Collection</h3>
        <button onclick="add('Strawberry Cake')">Strawberry Cake</button>
        <button onclick="add('Strawberry Drink')">Strawberry Drink</button>
        <button onclick="add('Strawberry Cookies')">Strawberry Cookies</button>
    </div>

    <div class="card">
        <h3>🍪 Cookie Cloud</h3>
        <button onclick="add('Chocolate Cookies')">Chocolate Cookies</button>
        <button onclick="add('Soft Cookies')">Soft Cookies</button>
        <button onclick="add('Strawberry Cookies')">Strawberry Cookies</button>
    </div>

    <div class="card">
        <h3>🎂 Cake Bliss</h3>
        <button onclick="add('Chocolate Cake')">Chocolate Cake</button>
        <button onclick="add('Vanilla Cake')">Vanilla Cake</button>
        <button onclick="add('Red Velvet Cake')">Red Velvet Cake</button>
    </div>

</div>

<script>

function add(item){
    let c = document.getElementById("cart");
    let div = document.createElement("div");
    div.className = "item";
    div.innerHTML = "🎀 " + item;
    c.appendChild(div);
}

</script>

</body>
</html>
